<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AzakanaGG — Rank</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:480px; height:470px;
  background:rgba(8,12,18,0.92);
  font-family:'Inter',sans-serif;
  overflow:hidden;
  border:1px solid #1E3A5F;
  border-radius:6px;
}
:root {
  --blue:#2D6BE4; --light:#6FAAFF;
  --border:#1E3A5F; --muted:#7D8590;
  --green:#3FB950; --red:#F85149;
}
.ph {
  background:rgba(45,107,228,0.13);
  border-bottom:1px solid var(--border);
  padding:7px 12px; font-size:9px; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase; color:var(--blue);
}
.body { padding:16px; }
.rank-tier { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:2px; }
.rank-value { font-size:22px; font-weight:800; color:var(--light); margin-bottom:2px; }
.rank-lp { font-size:13px; font-weight:600; color:var(--blue); margin-bottom:16px; }
.wr-row { display:flex; gap:12px; margin-bottom:20px; }
.wr-box {
  background:rgba(45,107,228,0.08);
  border:1px solid rgba(45,107,228,0.2);
  border-radius:6px; padding:8px 12px; flex:1; text-align:center;
}
.wr-label { font-size:8px; color:var(--muted); font-weight:600; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:3px; }
.wr-val { font-size:16px; font-weight:800; }
.wr-green { color:var(--green); }
.wr-blue  { color:var(--blue); }
.obj-label { font-size:9px; color:var(--muted); font-weight:600; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.obj-title { font-size:18px; font-weight:700; color:var(--light); }
.obj-lp    { font-size:24px; font-weight:800; color:var(--blue); margin-bottom:14px; }
.prog-track { width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; margin-bottom:6px; }
.prog-fill  { height:100%; background:var(--blue); border-radius:4px; transition:width 0.5s; }
.prog-labels { display:flex; justify-content:space-between; font-size:9px; }
.prog-cur { color:var(--light); font-weight:600; }
.prog-tgt { color:var(--muted); }
</style>
</head>
<body>
<div class="ph">RANK & OBJECTIF</div>
<div class="body">
  <div class="rank-tier" id="tier">Chargement...</div>
  <div class="rank-value" id="rank">---</div>
  <div class="rank-lp" id="lp">-- LP</div>
  <div class="wr-row">
    <div class="wr-box"><div class="wr-label">Victoires</div><div class="wr-val wr-green" id="wins">--</div></div>
    <div class="wr-box"><div class="wr-label">Défaites</div><div class="wr-val wr-blue" id="losses">--</div></div>
    <div class="wr-box"><div class="wr-label">Win Rate</div><div class="wr-val wr-green" id="wr">--%</div></div>
  </div>
  <div class="obj-label">Objectif</div>
  <div class="obj-title">Road to Master</div>
  <div class="obj-lp">600 LP</div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-labels">
    <span class="prog-cur" id="prog-cur">-- LP</span>
    <span class="prog-tgt">Master 600 LP</span>
  </div>
</div>

<script>
// === MODIFIE CES VALEURS ===
const API_KEY   = 'RGAPI-4a182b27-d108-461b-9ba7-7dd9643b28e8';
const GAME_NAME = 'Azakana';
const TAG_LINE  = 'YONE2';
const CLUSTER   = 'europe';
const REGION    = 'euw1';
const TARGET_LP = 600;

// Refresh toutes les 5 minutes pour limiter les appels
const REFRESH_MS = 5 * 60 * 1000;

const TIER_LP = {
  'IRON':0,'BRONZE':400,'SILVER':800,'GOLD':1200,'PLATINUM':1600,
  'EMERALD':2000,'DIAMOND':2400,'MASTER':2800
};
const RANK_LP = {'IV':0,'III':100,'II':200,'I':300};

function totalLP(tier, rank, lp) {
  return (TIER_LP[tier] ?? 2800) + (RANK_LP[rank] ?? 0) + lp;
}

async function fetchData() {
  try {
    // 1. PUUID via account-v1
    const accRes = await fetch(
      `https://${CLUSTER}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${GAME_NAME}/${TAG_LINE}`,
      { headers: { 'X-Riot-Token': API_KEY } }
    );
    if (!accRes.ok) throw new Error('Account ' + accRes.status);
    const acc = await accRes.json();
    const puuid = acc.puuid;

    // 2. Ranked data via entries/by-puuid (pas besoin de summoner ID)
    const rankRes = await fetch(
      `https://${REGION}.api.riotgames.com/lol/league/v4/entries/by-puuid/${puuid}`,
      { headers: { 'X-Riot-Token': API_KEY } }
    );
    if (!rankRes.ok) throw new Error('Rank ' + rankRes.status);
    const ranks = await rankRes.json();
    const solo = ranks.find(r => r.queueType === 'RANKED_SOLO_5x5');

    if (solo) {
      const tier   = solo.tier;
      const rank   = solo.rank;
      const lp     = solo.leaguePoints;
      const wins   = solo.wins;
      const losses = solo.losses;
      const wrPct  = Math.round(wins / (wins + losses) * 100);

      document.getElementById('tier').textContent    = 'Solo/Duo';
      document.getElementById('rank').textContent    = tier.charAt(0) + tier.slice(1).toLowerCase() + ' ' + rank;
      document.getElementById('lp').textContent      = lp + ' LP';
      document.getElementById('wins').textContent    = wins;
      document.getElementById('losses').textContent  = losses;
      document.getElementById('wr').textContent      = wrPct + '%';

      const currentTotal = totalLP(tier, rank, lp);
      const targetTotal  = totalLP('MASTER', 'I', TARGET_LP);
      const startTotal   = totalLP('DIAMOND', 'IV', 0);
      const pct = Math.max(0, Math.min(100,
        Math.round((currentTotal - startTotal) / (targetTotal - startTotal) * 100)
      ));
      document.getElementById('prog-fill').style.width = pct + '%';
      document.getElementById('prog-cur').textContent  = lp + ' LP (' + pct + '%)';
    } else {
      document.getElementById('tier').textContent = 'Non classé';
    }
  } catch(e) {
    document.getElementById('tier').textContent = 'Erreur: ' + e.message;
    console.error(e);
  }
}

fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
